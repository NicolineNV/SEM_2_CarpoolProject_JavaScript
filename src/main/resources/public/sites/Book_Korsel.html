        <select name="til/fra" id="til_fra" class="form-input">
          <option value="Til">Til</option>
          <option value="Fra">Fra</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label" for="select_by">Vælg by</label>
        <select name="select_by" id="select_by" class="form-input">
          <option value="Allinge">Allinge</option>
          <option value="Gudhjem">Gudhjem</option>
          <option value="Nexø">Nexø</option>
          <option value="Svanneke">Svanneke</option>
          <option value="Tejn">Tejn</option>
        </select>
      </div>

        <label class="form-label" for="date">Vælg dato</label>
        <input type="date" id="date" name="date" class="form-input">
      </div>

      <div class="form-group">
        <label class="form-label" for="time">Vælg tid</label>
        <select name="time" id="time" class="form-input">
          <option value="07:00">07:00</option>
          <option value="08:00">08:00</option>
          <option value="09:00">09:00</option>
          <option value="10:00">10:00</option>

          <option value="14:00">14:00</option>
          <option value="15:00">15:00</option>
          <option value="16:00">16:00</option>
        </select>
      </div>

      <div class="form-group">
        <button type="submit" class="book-btn">Søg</button>
      </div>

    </div>
  </form>
